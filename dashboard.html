<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>🌍 IoT Weather Station</h1>

<button onclick="logout()">Logout</button>

</header>

<div class="container">

<div class="card">

<h2>🌡 Temperature</h2>

<p id="temp">-- °C</p>

</div>

<div class="card">

<h2>💧 Humidity</h2>

<p id="humidity">-- %</p>

</div>

<div class="card">

<h2>🌧 Rain</h2>

<p id="rain">-- mm</p>

</div>

<div class="card">

<h2>🌬 Wind Speed</h2>

<p id="wind">-- m/s</p>

</div>

</div>

<div class="chart-box">

<h2>Temperature Realtime Chart</h2>

<canvas id="tempChart"></canvas>

</div>

<script src="script.js"></script>

</body>

</html>
