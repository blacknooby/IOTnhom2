<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>TRẠM QUAN TRẮC THỜI TIẾT IOT</h1>

<div class="dashboard">

<div class="card">
<h2>Nhiệt độ</h2>
<p id="temp">-- °C</p>
</div>

<div class="card">
<h2>Độ ẩm</h2>
<p id="humidity">-- %</p>
</div>

<div class="card">
<h2>Lượng mưa</h2>
<p id="rain">-- mm</p>
</div>

<div class="card">
<h2>Tốc độ gió</h2>
<p id="wind">-- m/s</p>
</div>

</div>

<button class="logout" onclick="logout()">Đăng xuất</button>

<script src="script.js"></script>

</body>

</html>
