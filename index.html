<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
<div class="login-box">
    <img src="https://raw.githubusercontent.com/blacknooby/IOTnhom2/refs/heads/main/Logo_Tr%C6%B0%E1%BB%9Dng_%C4%90%E1%BA%A1i_H%E1%BB%8Dc_S%C6%B0_Ph%E1%BA%A1m_K%E1%BB%B9_Thu%E1%BA%ADt_TP_H%E1%BB%93_Ch%C3%AD_Minh.png" alt="HCMUTE Logo" class="login-logo">
    <h1>🌍 Weather Station</h1>
    <div class="input-group">
        <input id="username" placeholder="Username" type="text">
    </div>
    <div class="input-group">
        <input id="password" type="password" placeholder="Password">
    </div>
    <button onclick="login()">Login</button>
    <p id="error"></p>
</div>
    <script src="script.js"></script>
</body>
</html>
